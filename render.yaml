services:
  - type: web
    name: signal-crm-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 2 --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 60 --access-logfile - --error-logfile -
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false   # Set in Render dashboard: your Supabase connection string
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: CORS_ORIGINS
        value: https://signal.nanoneuron.ai,https://signal-crm.pages.dev
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        value: rzp_test_SXSbotImCIeKSM
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        value: noreply@nanoneuron.ai
      - key: BANK_NAME
        value: Axis Bank Ltd
      - key: BANK_ACCOUNT_NUMBER
        value: "922020067340454"
      - key: BANK_ACCOUNT_HOLDER
        value: Nanoneuron Services
      - key: BANK_IFSC
        value: UTIB0005124
